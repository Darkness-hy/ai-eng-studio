services:
  tutor:
    build: .
    ports:
      - "8787:8787"
    environment:
      # subscription token from `claude setup-token` — put it in .env (gitignored)
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:?set CLAUDE_CODE_OAUTH_TOKEN in .env}
      TUTOR_MODEL: ${TUTOR_MODEL:-claude-sonnet-4-6}
      TUTOR_EFFORT: ${TUTOR_EFFORT:-medium}
      # multi-user knobs (tuned for one class on a single subscription)
      TUTOR_MAX_CONCURRENCY: ${TUTOR_MAX_CONCURRENCY:-3}
      TUTOR_MAX_QUEUE: ${TUTOR_MAX_QUEUE:-15}
      TUTOR_TIMEOUT: ${TUTOR_TIMEOUT:-120}
      TUTOR_LOG_DIR: ${TUTOR_LOG_DIR:-logs}
      TUTOR_ALLOWED_ORIGINS: ${TUTOR_ALLOWED_ORIGINS:-https://darkness-hy.github.io,http://localhost:5180}
      TUTOR_BEARER: ${TUTOR_BEARER:-}
      TUTOR_RATE_PER_MIN: ${TUTOR_RATE_PER_MIN:-0}
    volumes:
      # transcripts survive container restarts; inspect on the host under ./logs
      - ./logs:/app/logs
    restart: unless-stopped
